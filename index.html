<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Waiter Portal</title>
<link rel="icon" id="favicon" type="image/png" href="">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:      #080808;
  --s1:      #111111;
  --s2:      #181818;
  --s3:      #212121;
  --s4:      #2A2A2A;
  --bd:      rgba(255,255,255,0.07);
  --bd2:     rgba(255,255,255,0.13);
  --gold:    #C8922A;
  --gold-l:  #E8B84B;
  --gold-d:  rgba(200,146,42,0.13);
  --text:    #F0EBE2;
  --tm:      #8A8070;
  --td:      #4E4840;
  --green:   #3D9B6A;
  --green-d: rgba(61,155,106,0.14);
  --blue:    #4A7FC8;
  --blue-d:  rgba(74,127,200,0.14);
  --red:     #C04040;
  --red-d:   rgba(192,64,64,0.14);
  --amber:   #C8922A;
  --amber-d: rgba(200,146,42,0.14);
  --r:       12px;
  --rs:      8px;
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { height:100%; overflow:hidden; }
body { background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; font-size:14px; line-height:1.5; }

/* ── LOGIN ── */
#login-overlay { position:fixed; inset:0; background:var(--bg); z-index:1000; display:flex; align-items:center; justify-content:center; }
#auth-loading { position:fixed; inset:0; background:var(--bg); z-index:2000; display:flex; align-items:center; justify-content:center; }
@keyframes spin { to { transform:rotate(360deg); } }
.login-wrap { width:360px; max-width:92vw; background:var(--s1); border:1px solid var(--bd); border-radius:20px; padding:44px 36px; text-align:center; }
.login-logo { font-family:'Cormorant Garamond',serif; font-size:40px; font-weight:700; color:var(--gold); letter-spacing:6px; margin-bottom:4px; display:flex; align-items:center; justify-content:center; min-height:48px; }
.login-logo img { max-height:64px; max-width:200px; object-fit:contain; }
.tb-brand img { max-height:28px; max-width:110px; object-fit:contain; vertical-align:middle; }
.login-role { font-size:10px; letter-spacing:3.5px; text-transform:uppercase; color:var(--td); margin-bottom:36px; }
.login-field { width:100%; background:var(--s2); border:1px solid var(--bd); border-radius:var(--r); color:var(--text); font-size:15px; font-family:'DM Sans',sans-serif; padding:13px 16px; outline:none; transition:border-color .2s; margin-bottom:12px; }
.login-field:focus { border-color:rgba(200,146,42,.45); }
.login-field::placeholder { color:var(--td); }
.login-err { font-size:12px; color:var(--red); min-height:18px; margin-bottom:10px; }
.btn-login { width:100%; background:var(--gold); color:#0A0A0A; border:none; border-radius:var(--r); padding:13px; font-size:14px; font-weight:700; font-family:'DM Sans',sans-serif; cursor:pointer; transition:background .2s; letter-spacing:.5px; }
.btn-login:hover { background:var(--gold-l); }
.btn-login:disabled { opacity:.5; cursor:not-allowed; }
.cf-wrap { margin-bottom:14px; display:flex; justify-content:center; }

/* ── APP SHELL ── */
#waiter-app { display:none; height:100vh; flex-direction:column; }

/* ── TOPBAR ── */
#topbar {
  background: var(--s1); border-bottom: 1px solid var(--bd);
  padding: 0 18px; height: 56px; display: flex; align-items: center;
  gap: 12px; flex-shrink: 0; position: relative; z-index: 10;
}
.tb-logo-wrap { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
.tb-logo-wrap img { max-height: 28px; max-width: 100px; object-fit: contain; }
.tb-logo-wrap .tb-name { font-family:'Cormorant Garamond',serif; font-size:18px; font-weight:700; color:var(--gold); letter-spacing:2px; line-height:1; }
.tb-role { font-size:9px; letter-spacing:2px; text-transform:uppercase; color:var(--td); background:var(--s3); border:1px solid var(--bd); border-radius:100px; padding:3px 10px; white-space:nowrap; }
.tb-spacer { flex:1; }
.tb-time { font-size:11px; color:var(--td); font-family:'DM Mono',monospace; white-space:nowrap; }
.tb-icon-btn { width:36px; height:36px; border-radius:10px; border:1px solid var(--bd); background:var(--s2); color:var(--tm); display:flex; align-items:center; justify-content:center; cursor:pointer; transition:all .15s; flex-shrink:0; }
.tb-icon-btn:hover { background:var(--s3); color:var(--text); }
.tb-icon-btn svg { width:16px; height:16px; }
.tb-logout { font-size:12px; color:var(--tm); background:none; border:none; cursor:pointer; padding:5px 10px; border-radius:var(--rs); transition:background .15s; }
.tb-logout:hover { background:var(--s3); }

/* ── NAV TABS ── */
#nav-tabs { background:var(--s1); border-bottom:1px solid var(--bd); display:flex; padding:0 18px; gap:0; overflow-x:auto; scrollbar-width:none; flex-shrink:0; }
#nav-tabs::-webkit-scrollbar { display:none; }
.nav-tab { display:flex; align-items:center; gap:7px; padding:0 16px; height:44px; border:none; background:transparent; color:var(--tm); font-size:12.5px; font-weight:500; cursor:pointer; white-space:nowrap; border-bottom:2px solid transparent; margin-bottom:-1px; transition:all .18s; font-family:'DM Sans',sans-serif; }
.nav-tab svg { width:15px; height:15px; flex-shrink:0; }
.nav-tab.active { color:var(--gold); border-bottom-color:var(--gold); font-weight:600; }
.nav-tab:hover:not(.active) { color:var(--text); background:rgba(255,255,255,.03); }
.tab-badge { background:var(--red); color:#fff; font-size:9px; font-weight:700; min-width:16px; height:16px; border-radius:100px; display:inline-flex; align-items:center; justify-content:center; padding:0 4px; }

/* ── PROFILE DRAWER ── */
#profile-drawer { position:fixed; inset:0; z-index:600; pointer-events:none; }
#profile-drawer.open { pointer-events:all; }
#profile-backdrop { position:absolute; inset:0; background:rgba(0,0,0,0); transition:background .25s; cursor:pointer; }
#profile-drawer.open #profile-backdrop { background:rgba(0,0,0,0.65); }
#profile-panel { position:absolute; top:0; right:0; bottom:0; width:320px; max-width:92vw; background:var(--s1); border-left:1px solid var(--bd); transform:translateX(100%); transition:transform .28s cubic-bezier(.4,0,.2,1); display:flex; flex-direction:column; overflow:hidden; }
#profile-drawer.open #profile-panel { transform:translateX(0); }
.profile-header { padding:24px 20px 20px; border-bottom:1px solid var(--bd); flex-shrink:0; display:flex; align-items:flex-start; gap:14px; }
.profile-avatar-lg { width:52px; height:52px; border-radius:14px; background:var(--gold-d); border:1px solid rgba(200,146,42,.3); display:flex; align-items:center; justify-content:center; font-family:'Cormorant Garamond',serif; font-size:20px; font-weight:700; color:var(--gold); flex-shrink:0; }
.profile-name { font-size:16px; font-weight:700; color:var(--text); margin-bottom:2px; }
.profile-role-pill { display:inline-block; font-size:9px; letter-spacing:1.5px; text-transform:uppercase; font-weight:700; padding:3px 9px; border-radius:100px; background:var(--s3); border:1px solid var(--bd); color:var(--tm); }
.profile-emp-id { font-size:11px; color:var(--td); margin-top:4px; font-family:'DM Mono',monospace; }
.profile-body { flex:1; overflow-y:auto; padding:20px; }
.profile-row { margin-bottom:16px; }
.profile-label { font-size:10px; letter-spacing:1.5px; text-transform:uppercase; color:var(--td); font-weight:700; margin-bottom:4px; }
.profile-val { font-size:14px; color:var(--text); }
.profile-footer { padding:16px 20px; border-top:1px solid var(--bd); flex-shrink:0; }

/* ── PANELS ── */
.panel { display:none; flex:1; overflow-y:auto; padding:16px; }
.panel.active { display:block; }

/* ── PAGE HEADER ── */
.page-hd { display:flex; align-items:center; gap:12px; margin-bottom:16px; flex-wrap:wrap; }
.page-title { font-family:'Cormorant Garamond',serif; font-size:26px; font-weight:700; color:var(--text); }

/* ── CALL ALERT OVERLAY ── */
#call-alert-overlay {
  position:fixed; inset:0; z-index:2000;
  background:rgba(0,0,0,0.92);
  display:none; flex-direction:column;
  align-items:center; justify-content:center;
  text-align:center; padding:32px;
}
#call-alert-overlay.ringing { display:flex; }
.call-alert-icon {
  font-size:80px; margin-bottom:20px;
  animation:ringBounce 0.5s ease-in-out infinite alternate;
}
@keyframes ringBounce {
  from { transform:scale(1) rotate(-8deg); }
  to   { transform:scale(1.1) rotate(8deg); }
}
.call-alert-title {
  font-family:'Cormorant Garamond',serif;
  font-size:36px; font-weight:700;
  color:var(--gold); margin-bottom:8px;
}
.call-alert-sub {
  font-size:16px; color:var(--tm);
  margin-bottom:10px; line-height:1.6;
}
.call-alert-table {
  font-family:'DM Mono',monospace;
  font-size:48px; font-weight:700;
  color:var(--text); margin-bottom:32px;
  letter-spacing:2px;
}
.call-alert-pulse {
  width:120px; height:120px; border-radius:50%;
  background:rgba(200,146,42,0.15);
  position:absolute;
  animation:alertPulse 1.2s ease-out infinite;
}
@keyframes alertPulse {
  0%   { transform:scale(0.8); opacity:1; }
  100% { transform:scale(2.2); opacity:0; }
}
.btn-acknowledge {
  background:var(--gold); color:#0A0A0A;
  border:none; border-radius:var(--r);
  padding:18px 48px; font-size:16px;
  font-weight:700; font-family:'DM Sans',sans-serif;
  cursor:pointer; transition:all .2s;
  letter-spacing:.5px; position:relative; z-index:1;
}
.btn-acknowledge:hover { background:var(--gold-l); transform:scale(1.03); }

/* ── FILTER BAR ── */
.filter-bar { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:14px; }
.fbtn { padding:6px 14px; border-radius:100px; border:1px solid var(--bd); background:var(--s2); color:var(--tm); font-size:12px; font-weight:500; cursor:pointer; transition:all .15s; font-family:'DM Sans',sans-serif; }
.fbtn.active { background:var(--gold); color:#0A0A0A; border-color:var(--gold); font-weight:700; }

/* ── ORDER CARDS ── */
.order-card { background:var(--s2); border:1px solid var(--bd); border-radius:var(--r); margin-bottom:10px; overflow:hidden; transition:border-color .2s; }
.order-card.status-ready { border-left:3px solid var(--green); }
.order-card.status-served { border-left:3px solid var(--td); opacity:.65; }
.order-card.urgent { border-color:var(--gold); animation:urgentPulse 2s ease-in-out infinite; }
@keyframes urgentPulse { 0%,100%{box-shadow:0 0 0 0 transparent;} 50%{box-shadow:0 0 0 5px rgba(200,146,42,.15);} }

.oc-head { padding:12px 16px; display:flex; align-items:center; gap:10px; border-bottom:1px solid var(--bd); flex-wrap:wrap; }
.oc-num { font-family:'DM Mono',monospace; font-size:13px; font-weight:500; color:var(--gold); }
.oc-type { font-size:11px; font-weight:600; letter-spacing:.5px; text-transform:uppercase; color:var(--tm); }
.oc-table { background:var(--gold-d); border:1px solid rgba(200,146,42,.3); border-radius:100px; font-size:11px; font-weight:700; color:var(--gold); padding:2px 10px; }
.oc-time { font-size:11px; color:var(--td); margin-left:auto; font-family:'DM Mono',monospace; }

.oc-items { padding:12px 16px; border-bottom:1px solid var(--bd); }
.oc-item-row { display:flex; align-items:flex-start; gap:10px; padding:5px 0; border-bottom:1px solid var(--bd); }
.oc-item-row:last-child { border-bottom:none; }
.oc-qty { min-width:28px; height:28px; background:var(--s3); border-radius:6px; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:700; color:var(--gold); flex-shrink:0; }
.oc-item-name { flex:1; font-size:13px; font-weight:500; }

.oc-foot { padding:10px 16px; display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
.oc-elapsed { font-size:11px; color:var(--td); font-family:'DM Mono',monospace; margin-right:auto; }
.oc-elapsed.warn { color:var(--amber); }
.oc-elapsed.late { color:var(--red); }

/* ── TABLE GRID ── */
.table-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(80px,1fr)); gap:10px; margin-bottom:16px; }
.table-tile { background:var(--s2); border:1px solid var(--bd); border-radius:var(--r); padding:16px 10px; text-align:center; cursor:pointer; transition:all .2s; }
.table-tile:hover { border-color:var(--bd2); background:var(--s3); }
.table-tile.occupied { border-color:rgba(200,146,42,.4); background:var(--gold-d); }
.table-tile.ready    { border-color:rgba(61,155,106,.4); background:var(--green-d); animation:urgentPulse 2s infinite; }
.table-tile.free     { opacity:.4; }
.table-num { font-family:'Cormorant Garamond',serif; font-size:24px; font-weight:700; margin-bottom:4px; }
.table-status-label { font-size:10px; letter-spacing:1px; text-transform:uppercase; color:var(--td); }
.table-tile.occupied .table-status-label { color:var(--gold); }
.table-tile.ready    .table-status-label { color:var(--green); }

/* ── RESERVATION CARDS ── */
.resv-card { background:var(--s2); border:1px solid var(--bd); border-radius:var(--r); padding:14px 16px; margin-bottom:10px; }
.resv-card.upcoming { border-left:3px solid var(--gold); }
.resv-head { display:flex; align-items:center; gap:8px; margin-bottom:8px; flex-wrap:wrap; }
.resv-name { font-weight:700; font-size:14px; }
.resv-time { font-size:12px; color:var(--tm); margin-left:auto; font-family:'DM Mono',monospace; }
.resv-meta { display:flex; gap:14px; flex-wrap:wrap; font-size:12.5px; color:var(--tm); }
.resv-meta span b { color:var(--text); }

/* ── BADGES ── */
.badge { display:inline-flex; align-items:center; padding:3px 9px; border-radius:100px; font-size:11px; font-weight:600; letter-spacing:.3px; }
.badge-amber  { background:var(--amber-d); color:var(--amber); border:1px solid rgba(200,146,42,.25); }
.badge-blue   { background:var(--blue-d);  color:var(--blue);  border:1px solid rgba(74,127,200,.25); }
.badge-green  { background:var(--green-d); color:var(--green); border:1px solid rgba(61,155,106,.25); }
.badge-grey   { background:var(--s3);      color:var(--tm);    border:1px solid var(--bd); }
.badge-red    { background:var(--red-d);   color:var(--red);   border:1px solid rgba(192,64,64,.25); }

/* ── STATUS BUTTONS ── */
.sbtn { padding:7px 14px; border-radius:var(--rs); border:1px solid var(--bd); background:var(--s3); color:var(--tm); font-size:12px; font-weight:600; cursor:pointer; transition:all .18s; font-family:'DM Sans',sans-serif; white-space:nowrap; }
.sbtn:hover { background:var(--s4); color:var(--text); }
.sbtn-serve  { background:var(--green-d); color:var(--green); border-color:rgba(61,155,106,.3); }
.sbtn-done   { background:var(--s3); color:var(--tm); }
.sbtn-deliv  { background:var(--blue-d); color:var(--blue); border-color:rgba(74,127,200,.3); }

/* ── EMPTY STATE ── */
.empty-state { text-align:center; padding:60px 20px; color:var(--td); }
.empty-state .emoji { font-size:48px; margin-bottom:14px; }
.empty-state h3 { font-size:16px; font-weight:600; color:var(--tm); margin-bottom:6px; }
.empty-state p  { font-size:13px; }

/* ── SPINNER ── */
.spinner { width:30px; height:30px; border:2px solid var(--s4); border-top-color:var(--gold); border-radius:50%; animation:spin .75s linear infinite; margin:40px auto; }
@keyframes spin { to { transform:rotate(360deg); } }

/* ── BUTTONS ── */
.btn { padding:9px 18px; border-radius:var(--rs); border:1px solid var(--bd); background:var(--s3); color:var(--text); font-size:13px; font-weight:600; cursor:pointer; transition:all .18s; font-family:'DM Sans',sans-serif; display:inline-flex; align-items:center; gap:6px; white-space:nowrap; }
.btn:hover { background:var(--s4); }
.btn:disabled { opacity:.45; cursor:not-allowed; }
.btn-gold  { background:var(--gold); color:#0A0A0A; border-color:var(--gold); }
.btn-gold:hover { background:var(--gold-l); }
.btn-ghost { background:transparent; }
.btn-ghost:hover { background:var(--s3); }
.btn-sm { padding:6px 12px; font-size:12px; }
.btn-full { width:100%; justify-content:center; }

/* ── TOAST ── */
#toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(80px); background:var(--s1); border:1px solid var(--bd); border-radius:100px; padding:10px 20px; font-size:13px; font-weight:500; transition:transform .3s cubic-bezier(.34,1.56,.64,1), opacity .3s; opacity:0; z-index:9999; white-space:nowrap; pointer-events:none; max-width:90vw; text-align:center; }
#toast.show { transform:translateX(-50%) translateY(0); opacity:1; }
#toast.t-success { border-color:rgba(61,155,106,.4); color:var(--green); }
#toast.t-error   { border-color:rgba(192,64,64,.4);  color:var(--red); }

/* ── RESPONSIVE ── */
@media(max-width:480px) {
  #topbar { padding:0 12px; }
  .panel  { padding:12px; }
}
</style>
</head>
<body>

<!-- ══ LOGIN OVERLAY ═══════════════════════════════════ -->
<div id="auth-loading"><div style="width:32px;height:32px;border:3px solid var(--bd);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite;"></div></div>
<div id="login-overlay" style="display:none;">
  <div class="login-wrap">
    <div class="login-logo" id="login-logo" style="visibility:hidden">Restaurant</div>
    <div class="login-role">Waiter Portal</div>
    <input type="email" id="login-email" class="login-field" placeholder="Email address"
      onkeydown="if(event.key==='Enter')document.getElementById('login-pw').focus()">
    <input type="password" id="login-pw" class="login-field" placeholder="Password"
      onkeydown="if(event.key==='Enter')tryWaiterLogin()">
    <div class="cf-wrap">
      <div class="cf-turnstile"
        data-sitekey="0x4AAAAAADbz8ooMXkxM2KGb"
        data-theme="dark"
        data-callback="onTurnstileSuccess"></div>
    </div>
    <div class="login-err" id="login-err"></div>
    <button class="btn-login" id="login-btn" onclick="tryWaiterLogin()" disabled>Sign In →</button>
  </div>
</div>

<!-- ══ WAITER APP ══════════════════════════════════════ -->
<div id="waiter-app">

<!-- TOPBAR -->
  <div id="topbar">
    <div class="tb-logo-wrap" id="tb-brand"><span class="tb-name">Restaurant</span></div>
    <div class="tb-role">Waiter</div>
    <div class="tb-spacer"></div>
    <div class="tb-time" id="tb-time"></div>
    <button class="tb-icon-btn" onclick="openProfile()" title="My Profile">
      <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6">
        <circle cx="10" cy="7" r="3.5"/><path d="M3 17c0-3.3 3.1-6 7-6s7 2.7 7 6" stroke-linecap="round"/>
      </svg>
    </button>
    <button class="tb-logout" onclick="waiterLogout()">Sign Out</button>
  </div>

  <!-- NAV TABS -->
<div id="nav-tabs">
    <button class="nav-tab active" id="tab-calls-btn" onclick="switchTab('calls')">
      <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M4 4h4l2 4-2.5 1.5a9 9 0 004 4L13 11l4 2v4a1 1 0 01-1 1A15 15 0 013 5a1 1 0 011-1z"/></svg>
      Calls <span class="tab-badge" id="calls-badge" style="display:none">0</span>
    </button>
    <button class="nav-tab" id="tab-orders-btn" onclick="switchTab('orders')">
      <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="3" y="3" width="14" height="14" rx="2"/><path d="M7 7h6M7 10h6M7 13h4"/></svg>
      My Orders <span class="tab-badge" id="orders-badge" style="display:none">0</span>
    </button>
    <button class="nav-tab" id="tab-tables-btn" onclick="switchTab('tables')">
      <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="2" y="6" width="16" height="3" rx="1"/><path d="M5 9v5M15 9v5M8 14h4"/></svg>
      Tables
    </button>
    <button class="nav-tab" id="tab-reservations-btn" onclick="switchTab('reservations')">
      <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="3" y="4" width="14" height="13" rx="2"/><path d="M3 8h14M7 3v2M13 3v2"/></svg>
      Reservations
    </button>
    <button class="nav-tab" id="tab-notifications-btn" onclick="switchTab('notifications')">
      <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M10 3a5 5 0 015 5v3l1.5 2.5H3.5L5 11V8a5 5 0 015-5z"/><path d="M8.5 16a1.5 1.5 0 003 0"/></svg>
      Alerts <span class="tab-badge" id="notifications-badge" style="display:none">0</span>
    </button>
  <button class="nav-tab" id="tab-create-order-btn" onclick="switchTab('create-order')">
      <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M10 4v12M4 10h12"/></svg>
      New Order

// ── HASH EMAIL ────────────────────────────────
async function hashEmail(email) {
  const normalized = email.trim().toLowerCase();
  const buf  = new TextEncoder().encode(normalized);
  const hash = await crypto.subtle.digest('SHA-256', buf);
  return Array.from(new Uint8Array(hash)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

// ── LOGIN ─────────────────────────────────────
async function tryWaiterLogin() {
  if (!_turnstileToken) { showLoginErr('Please complete the human check.'); return; }
  const email = document.getElementById('login-email').value.trim().toLowerCase();
  const pw    = document.getElementById('login-pw').value;
  if (!email) { showLoginErr('Enter your email'); return; }
  if (!pw)    { showLoginErr('Enter your password'); return; }

  const btn = document.getElementById('login-btn');
  btn.disabled = true; btn.textContent = 'Checking…';

  try {
    // STEP 1 — role check BEFORE auth — zero wrong access
    const hash     = await hashEmail(email);
    const roleSnap = await db.collection('employee_roles').doc(hash).get();

    if (!roleSnap.exists) {
      showLoginErr('No account found for this email.'); resetLoginBtn(); return;
    }

    const roleData = roleSnap.data();

    if (!['waiter','superadmin','admin'].includes(roleData.role)) {
      showLoginErr('Access denied. This portal is for waiters only.'); resetLoginBtn(); return;
    }

    if (roleData.active === false || roleData.frozen === true) {
      showLoginErr('Your access has been suspended. Contact your manager.'); resetLoginBtn(); return;
    }

    // STEP 2 — role confirmed, authenticate
    btn.textContent = 'Signing in…';
    await firebase.auth().signInWithEmailAndPassword(email, pw);

  } catch(e) {
    const msg = e.code === 'auth/wrong-password' || e.code === 'auth/user-not-found'
      ? 'Incorrect email or password' : e.message;
    showLoginErr(msg);
    resetLoginBtn();
    _turnstileToken = null;
    if (window.turnstile) turnstile.reset();
  }
}

  }

const empSnap = await db.collection('employees').doc(user.uid).get();
    currentEmployee = empSnap.exists ? empSnap.data() : { name: user.email, role:'waiter' };

if (window._sessionUnsub) { window._sessionUnsub(); window._sessionUnsub = null; }
    const _sessionToken = 'w-' + Date.now() + '-' + Math.random().toString(36).slice(2,8);
    await db.collection('employees').doc(user.uid).set({ sessionToken: _sessionToken }, { merge: true });
    window._sessionUnsub = db.collection('employees').doc(user.uid).onSnapshot(snap => {

document.getElementById('auth-loading').style.display  = 'none';

// ── IDLE / TAB-CLOSE WATCHER ──────────────────
let _idleTimer = null;
let _watcherStarted = false;
const IDLE_MS = 60 * 60 * 1000; // 1 hour

function startIdleWatcher(logoutFn) {
  if (_watcherStarted) {
    clearTimeout(_idleTimer);
    _idleTimer = setTimeout(() => logoutFn(), IDLE_MS);
    return;
  }
  _watcherStarted = true;
  const _logout = logoutFn;

  function resetIdle() {
    clearTimeout(_idleTimer);
    _idleTimer = setTimeout(() => _logout(), IDLE_MS);
  }

  ['mousemove','mousedown','keydown','touchstart','scroll','click'].forEach(evt => {
    document.addEventListener(evt, resetIdle, { passive: true });
  });

  // Logout on actual tab/window close only (not on tab switch)
  window.addEventListener('pagehide', () => _logout(), { once: true });

  resetIdle();
}

function stopIdleWatcher() {
  clearTimeout(_idleTimer);
  _watcherStarted = false;
}

function applyBrandColors(bc) {
  const root = document.documentElement;
  if (bc.primary) {
    const r = parseInt(bc.primary.slice(1,3),16);
    const g = parseInt(bc.primary.slice(3,5),16);
    const b = parseInt(bc.primary.slice(5,7),16);
    root.style.setProperty('--gold',    bc.primary);
    root.style.setProperty('--gold-l',  lightenHex(bc.primary, 30));
    root.style.setProperty('--gold-d',  `rgba(${r},${g},${b},0.13)`);
    root.style.setProperty('--amber',   bc.primary);
    root.style.setProperty('--amber-d', `rgba(${r},${g},${b},0.14)`);
  }
  if (bc.bg)      root.style.setProperty('--bg',   bc.bg);
  if (bc.surface) {
    root.style.setProperty('--s1', bc.surface);
    root.style.setProperty('--s2', bc.surface);
  }
  if (bc.text)    root.style.setProperty('--text', bc.text);
}

function lightenHex(hex, amt) {
  const num = parseInt(hex.replace('#',''),16);
  const r = Math.min(255,(num>>16)+amt);
  const g = Math.min(255,((num>>8)&0xff)+amt);
  const b = Math.min(255,(num&0xff)+amt);
  return '#'+[r,g,b].map(v=>v.toString(16).padStart(2,'0')).join('');
}

// ★ CALL SYSTEM — rings until acknowledged
// ══════════════════════════════════════════════
let _knownCallIds = new Set();

function startCallsListener() {
  if (!db) return;
  const cutoff = new Date(); cutoff.setHours(0,0,0,0);

  callsListener = db.collection('staff_calls')
    .where('type',     '==', 'admin_to_waiter')
    .where('status',   '==', 'ringing')
    .where('calledAt', '>=', firebase.firestore.Timestamp.fromDate(cutoff))
    .onSnapshot(snap => {
  const assignedTables = currentEmployee?.assignedTables || null;

      const ringing = snap.docs.filter(d => {
        const data = d.data();
        if (data.acknowledged) return false;
        // If call targets a specific uid, only that waiter
        if (data.targetUid && currentUser && data.targetUid !== currentUser.uid) return false;
        // If this waiter has assigned tables, only show calls for those tables
        if (assignedTables && assignedTables.length > 0 && data.tableNumber) {
          if (!assignedTables.map(String).includes(String(data.tableNumber))) return false;
        }
        return true;
      });

      const badge = document.getElementById('calls-badge');
      if (badge) {
        badge.textContent   = ringing.length;
        badge.style.display = ringing.length ? 'inline-flex' : 'none';
      }

      // Trigger ring alert for new calls
const newCall = snap.docChanges().find(c => {
        if (c.type !== 'added') return false;
        if (_knownCallIds.has(c.doc.id)) return false;
        const data = c.doc.data();
        if (data.acknowledged) return false;
        if (data.targetUid && currentUser && data.targetUid !== currentUser.uid) return false;
        if (assignedTables && assignedTables.length > 0 && data.tableNumber) {
          if (!assignedTables.map(String).includes(String(data.tableNumber))) return false;
        }
        return true;
      });

      if (newCall) {
        _knownCallIds.add(newCall.doc.id);
        showCallAlert(newCall.doc.id, newCall.doc.data());
      }

      snap.docs.forEach(d => _knownCallIds.add(d.id));

      if (activeCallId) {
        const stillRinging = snap.docs.find(d => d.id === activeCallId && !d.data().acknowledged);
        if (!stillRinging) stopRinging();
      }

      if (document.getElementById('panel-calls').classList.contains('active')) renderCallList();
    }, e => console.warn('calls listener:', e));
}

async function acknowledgeCall() {
  if (!activeCallId || !db) return;
  try {
    await db.collection('staff_calls').doc(activeCallId).update({
      status:         'acknowledged',
      acknowledged:   true,
      acknowledgedBy: currentEmployee?.name || 'Waiter',

    });
    stopRinging();
    toast('Call acknowledged', 'success');

  }
}

function stopRinging() {
  activeCallId = null;
  document.getElementById('call-alert-overlay').classList.remove('ringing');
  if (ringInterval) { clearInterval(ringInterval); ringInterval = null; }
}

function startRinging() {
  if (ringInterval) clearInterval(ringInterval);
  playRingChime();
  ringInterval = setInterval(playRingChime, 2500);
}

function playRingChime() {
  try {
    const customB64 = localStorage.getItem('hx_sound_custom_b64');
    if (customB64) {
      const audio = new Audio(customB64);
      audio.volume = 1.0;
      audio.play().catch(() => _playDefaultChime());
    } else {
      _playDefaultChime();
    }
  } catch(e) {}
}

function _playDefaultChime() {
  try {
    const ctx  = new (window.AudioContext || window.webkitAudioContext)();
    const freqs = [880, 660, 880, 660];
    freqs.forEach((freq, i) => {
      const osc  = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.frequency.value = freq;
      osc.type = 'sine';
      const t = ctx.currentTime + i * 0.15;
      gain.gain.setValueAtTime(0, t);
      gain.gain.linearRampToValueAtTime(0.3, t + 0.04);
      gain.gain.linearRampToValueAtTime(0, t + 0.18);
      osc.start(t); osc.stop(t + 0.2);
    });
  } catch(e) {}
}

function startOrdersListener() {

ordersListener = db.collection('orders')
    .where('timestamp','>=', firebase.firestore.Timestamp.fromDate(cutoff))

      const assignedTables = currentEmployee?.assignedTables;
      allOrders = snap.docs.map(d => ({ ...d.data(), _id:d.id }))
        .filter(o => {
          if (o.orderType !== 'dine_in') return false;

          if (assignedTables && assignedTables.length > 0) {

      });

        playRingChime();
        toast(`${newlyReady.length} order${newlyReady.length > 1 ? 's' : ''} ready for service`, 'success');

      snap.docs.forEach(d => knownOrderIds.add(d.id));

// ── ORDER EDIT PERMISSION ─────────────────────
function canEditOrder(order) {
  if (!settings.orderEditWaiter) return false;
  const editWin = (settings.orderEditWindow ?? 10) * 60 * 1000;
  if (editWin === 0) return false;
  const ts = order.timestamp?.seconds ? order.timestamp.seconds * 1000 : Date.now();
  return (Date.now() - ts) <= editWin;
}

async function waiterVoidItem(orderId, itemIndex) {
  const order = allOrders.find(o => o._id === orderId);
  if (!order) return;
  if (!canEditOrder(order)) { toast('Order is locked for editing', 'error'); return; }

  const items = [...(order.items || [])];
  if (!items[itemIndex]) return;
  const item = items[itemIndex];
  if (item.voided) { toast('Item already voided', 'error'); return; }

  items[itemIndex] = { ...item, voided: true, voidedBy: currentEmployee?.name || 'Waiter', voidedAt: Date.now() };
  const newTotal = items.filter(i => !i.voided).reduce((s, i) => s + (i.unitPrice || i.price || 0) * (i.qty || 1), 0);

  await db.collection('orders').doc(orderId).update({
    items,
    total: newTotal,
    editLog: firebase.firestore.FieldValue.arrayUnion({
      time: new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}),
      reason: `Item voided: ${item.name}`,
      by: currentEmployee?.name || 'Waiter'
    }),
    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
  }).catch(e => console.warn(e));
  toast(`${item.name} voided`, 'success');
}
  
function renderOrders() {
  const con = document.getElementById('orders-list');
  if (!con) return;

  let list = [...allOrders];
  if (orderFilter === 'ready')  list = list.filter(o => o.status === 'ready');

    con.innerHTML = `<div class="empty-state"><div class="emoji">🍽</div><h3>${orderFilter === 'ready' ? 'No orders ready' : 'No orders'}</h3><p>Ready orders from the kitchen appear here</p></div>`;
    return;
  }

  con.innerHTML = '';
  list.forEach(o => {
    const ts      = o.timestamp?.seconds ? new Date(o.timestamp.seconds*1000) : new Date();
    const elapsed = Math.floor((Date.now()-ts.getTime())/60000);
    const elClass = elapsed >= 20 ? 'late' : elapsed >= 12 ? 'warn' : '';
    const isUrgent = o.status === 'ready' && elapsed >= 8;

    const card = document.createElement('div');
    card.className = `order-card status-${o.status}${isUrgent ? ' urgent' : ''}`;

const items = (o.items||[]).map((i, idx) =>
      `<div class="oc-item-row${i.voided ? '" style="opacity:.4;text-decoration:line-through' : ''}">
        <div class="oc-qty">${i.qty||1}</div>

        ${editable && !i.voided ? `<button onclick="waiterVoidItem('${o._id}',${idx})" style="margin-left:auto;background:none;border:none;color:var(--red);cursor:pointer;font-size:11px;padding:2px 6px;" title="Void item">✕</button>` : ''}
      </div>`
    ).join('');

let btns = '';

      btns = `<button class="sbtn sbtn-serve" onclick="markServed('${o._id}')">✓ Mark Served</button>`;
    }

    }

    card.innerHTML = `

        <span class="badge badge-${STATUS_COLORS[o.status]||'grey'}">${STATUS_LABELS[o.status]||o.status}</span>

        <span class="oc-elapsed ${elClass}">⏱ ${elapsed}m ago</span>
        ${btns}
      </div>`;
    con.appendChild(card);
  });

function renderTableGrid() {
  const wrap = document.getElementById('table-grid-wrap');
  if (!wrap) return;

  const count = settings.tableCount || 10;

  // Build table status map from orders
  const tableMap = {};
  allOrders.forEach(o => {
    if (!o.tableNumber) return;
    const t = parseInt(o.tableNumber);
    if (!tableMap[t] || o.status === 'ready') {
      tableMap[t] = o.status;
    }
  });

const assignedTables = currentEmployee?.assignedTables;
  const tablesToShow = (assignedTables && assignedTables.length > 0)
    ? assignedTables.map(Number).sort((a,b) => a - b)
    : Array.from({ length: count }, (_, i) => i + 1);

  let html = `<div class="table-grid">`;
  for (const i of tablesToShow) {
    const status = tableMap[i];
let tileClass = 'table-tile free';
    let label     = 'Free';
    if (status === 'ready')       { tileClass = 'table-tile ready';    label = 'Ready!'; }
    else if (status === 'received' || status === 'confirmed' || status === 'preparing') {
      tileClass = 'table-tile occupied'; label = status.replace('_', ' ');
    }
    // served/completed = free (already filtered out of allOrders)
    html += `
      <div class="${tileClass}" onclick="filterByTable(${i})">
        <div class="table-num">${i}</div>
        <div class="table-status-label">${label}</div>
      </div>`;
  }
  html += `</div>
  <p style="font-size:12px;color:var(--td);text-align:center;margin-top:8px;">
    Tap a table to view its orders
  </p>`;
  wrap.innerHTML = html;
}

function filterByTable(tableNum) {
  // Switch to orders tab and filter by table
  switchTab('orders');
  orderFilter = 'all';
  document.querySelectorAll('#panel-orders .fbtn').forEach(b => b.classList.remove('active'));
  document.getElementById('of-all').classList.add('active');

  const con = document.getElementById('orders-list');
  const tableOrders = allOrders.filter(o => parseInt(o.tableNumber) === tableNum);

  if (!tableOrders.length) {
    con.innerHTML = `<div class="empty-state"><div class="emoji">🪑</div><h3>Table ${tableNum} is free</h3></div>`;
    return;
  }

  // Re-render with table filter
  const prev = orderFilter;
  con.innerHTML = '';
  tableOrders.forEach(o => {
    const ts      = o.timestamp?.seconds ? new Date(o.timestamp.seconds*1000) : new Date();
    const elapsed = Math.floor((Date.now()-ts.getTime())/60000);
    const elClass = elapsed >= 20 ? 'late' : elapsed >= 12 ? 'warn' : '';
    const items   = (o.items||[]).map(i =>
      `<div class="oc-item-row"><div class="oc-qty">${i.qty||1}</div><div class="oc-item-name">${escHtml(i.name)}</div></div>`
    ).join('');
    let btns = '';
    if (o.status === 'ready')  btns = `<button class="sbtn sbtn-serve" onclick="markServed('${o._id}')">✓ Mark Served</button>`;
    if (o.status === 'served') btns = `<button class="sbtn sbtn-done" onclick="markFinished('${o._id}')">✓ Table Done</button>`;

    const card = document.createElement('div');
    card.className = `order-card status-${o.status}`;
    card.innerHTML = `
      <div class="oc-head">
        <span class="oc-num">#${o.orderNumber}</span>
        <span class="oc-table">T${o.tableNumber}</span>
        <span class="badge badge-${STATUS_COLORS[o.status]||'grey'}">${STATUS_LABELS[o.status]||o.status}</span>
        <span class="oc-time">${ts.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</span>
      </div>
      <div class="oc-items">${items}</div>
      <div class="oc-foot">
        <span class="oc-elapsed ${elClass}">⏱ ${elapsed}m</span>${btns}
      </div>`;
    con.appendChild(card);
  });
}

let _waiterMenuItems = [];
function loadMenuForOrdering() {
  db.collection('menu_items').onSnapshot(snap => {
    _waiterMenuItems = snap.docs.map(d => ({...d.data(), _id:d.id}))
      .filter(i => i.avail !== false)
      .sort((a,b)=>(a.name||'').localeCompare(b.name||''));
    if (document.getElementById('panel-create-order').classList.contains('active')) {
      renderOrderMenu();
    }
  });
}

function renderOrderMenu() {
  const wrap = document.getElementById('co-menu-wrap');
  if (!wrap) return;
  if (!_waiterMenuItems.length) {
    wrap.innerHTML = `<div class="empty-state"><h3>No menu items available</h3></div>`;
    return;
  }
  // Group by category
  const groups = {};
  _waiterMenuItems.forEach(i => {
    const cat = i.cat || i.category || 'Other';
    if (!groups[cat]) groups[cat] = [];
    groups[cat].push(i);
  });
  wrap.innerHTML = Object.entries(groups).map(([cat, items]) => `
    <div style="margin-bottom:14px;">
      <div style="font-size:11px;font-weight:700;color:var(--td);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px;">${escHtml(cat)}</div>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px;">
        ${items.map(item => `
          <div style="background:var(--s2);border:1px solid var(--bd);border-radius:var(--rs);padding:10px;cursor:pointer;" onclick="addToWaiterCart('${item._id}')">
            <div style="font-size:13px;font-weight:600;">${escHtml(item.name||'')}</div>
            <div style="font-size:12px;color:var(--gold);">${item.price ? (settings.currency||'$') + parseFloat(item.price).toFixed(2) : ''}</div>
          </div>
        `).join('')}
      </div>
    </div>
  `).join('');
}

function addToWaiterCart(itemId) {
  const item = _waiterMenuItems.find(i => i._id === itemId);
  if (!item) return;
  const existing = waiterCart.find(c => c._id === itemId);
  if (existing) { existing.qty++; }
  else { waiterCart.push({...item, qty: 1}); }
  renderWaiterCart();
}

function renderWaiterCart() {
  const con = document.getElementById('co-cart');
  if (!con) return;
  if (!waiterCart.length) { con.innerHTML = ''; document.getElementById('co-total').textContent = ''; return; }
  const currency = settings.currency || '$';
  let total = 0;
  con.innerHTML = `
    <div style="background:var(--s2);border:1px solid var(--bd);border-radius:var(--r);padding:12px;margin-bottom:4px;">
      <div style="font-size:12px;font-weight:700;color:var(--td);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px;">Cart</div>
      ${waiterCart.map((i, idx) => {
        const lineTotal = (parseFloat(i.price)||0) * i.qty;
        total += lineTotal;
        return `<div style="display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--bd);">
          <span style="flex:1;font-size:13px;">${escHtml(i.name)}</span>
          <button class="btn btn-ghost btn-sm" style="padding:0 8px;" onclick="changeCartQty(${idx},-1)">−</button>
          <span style="min-width:20px;text-align:center;font-size:13px;">${i.qty}</span>
          <button class="btn btn-ghost btn-sm" style="padding:0 8px;" onclick="changeCartQty(${idx},1)">+</button>
          <span style="font-size:13px;color:var(--gold);min-width:55px;text-align:right;">${currency}${lineTotal.toFixed(2)}</span>
        </div>`;
      }).join('')}
    </div>`;
  document.getElementById('co-total').textContent = `Total: ${currency}${total.toFixed(2)}`;
}

function changeCartQty(idx, delta) {
  waiterCart[idx].qty += delta;
  if (waiterCart[idx].qty <= 0) waiterCart.splice(idx, 1);
  renderWaiterCart();
}

function clearWaiterCart() {
  waiterCart = [];
  renderWaiterCart();
}

async function submitWaiterOrder() {
  const tableNum = document.getElementById('co-table').value;
  if (!tableNum) { toast('Select a table first', 'error'); return; }
  if (!waiterCart.length) { toast('Add items to the cart', 'error'); return; }

  const currency = settings.currency || '$';
  const items = waiterCart.map(i => ({ name: i.name, qty: i.qty, price: parseFloat(i.price)||0, _id: i._id }));
  const subtotal = items.reduce((s, i) => s + i.price * i.qty, 0);

  const orderNum = 'W' + Date.now().toString().slice(-6);

  try {
    await db.collection('orders').add({
      orderNumber:  orderNum,
      orderType:    'dine_in',
      tableNumber:  parseInt(tableNum),
      items,
      subtotal,
      total:        subtotal,
      status:       'received',
      paymentStatus:'unpaid',
      createdBy:    currentEmployee?.name || 'Waiter',
      createdByUid: currentUser?.uid || '',
      timestamp:    firebase.firestore.FieldValue.serverTimestamp(),
      statusTimestamps: { received: firebase.firestore.FieldValue.serverTimestamp() }
    });
    toast(`Order #${orderNum} placed for Table ${tableNum}`, 'success');
    clearWaiterCart();
    document.getElementById('co-table').value = '';
  } catch(e) {
    toast('Error placing order: ' + e.message, 'error');
  }
}
  
</script>
</body>
</html>
